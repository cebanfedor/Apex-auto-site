<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Страница не найдена — Apex Auto</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/styles.css?v=v370">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <style>
    .notFoundWrap { min-height: calc(100vh - 120px); display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .notFoundCard { background: #fff; border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 48px 40px; text-align: center; max-width: 480px; box-shadow: var(--shadow-sm); }
    .notFoundCode { font-size: 80px; font-weight: 800; color: var(--red); line-height: 1; letter-spacing: -0.04em; margin-bottom: 12px; }
    .notFoundCard h1 { font-size: 22px; margin: 0 0 12px; }
    .notFoundCard p { font-size: 15px; color: var(--muted); margin: 0 0 28px; line-height: 1.6; }
    .notFoundBtns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .notFoundBtns a { display: inline-flex; align-items: center; height: 44px; padding: 0 20px; border-radius: 10px; font-weight: 600; font-size: 14px; text-decoration: none; }
    .notFoundBtns .primary { background: var(--red); color: #fff; }
    .notFoundBtns .ghost { border: 1px solid var(--line); color: var(--ink); }
    @media (max-width: 480px) { .notFoundCard { padding: 32px 20px; } .notFoundCode { font-size: 60px; } }
  </style>
</head>
<body>
  <header class="siteHeader apexHdrV201">
    <a class="headerBrand apexBrandV201" href="/" aria-label="Apex Auto — на главную">
      <img src="/assets/apex-logo-glass-upload-v117.png" alt="Apex Auto">
      <span class="apexBrandTextV201">
        <strong class="brandTextV77"><span class="brandApexV77">Apex</span><span class="brandAutoV77">Auto</span></strong>
        <small>Доставка авто из США и Канады в Молдову</small>
      </span>
    </a>
    <a class="headerPhoneV308" href="tel:068832032" aria-label="Позвонить 068-832-032">068-832-032</a>
  </header>

  <div class="notFoundWrap">
    <div class="notFoundCard">
      <div class="notFoundCode">404</div>
      <h1>Страница не найдена</h1>
      <p>Такой страницы не существует или она была перемещена. Возможно, вы ошиблись в адресе.</p>
      <div class="notFoundBtns">
        <a href="/" class="primary">На главную</a>
        <a href="/auctions" class="ghost">Смотреть аукционы</a>
      </div>
    </div>
  </div>
</body>
